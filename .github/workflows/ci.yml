name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      # No Perforce is installed: every test runs against the in-memory
      # MockP4Runner, so CI is fully offline.
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
